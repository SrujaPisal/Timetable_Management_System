<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Timetable Management</title>
    <link rel="stylesheet" href="styles.css">
   
</head>
<body>
    <div class="login-container">
        
        <h3>OPTIMIZED TIMETABLE MANAGEMENT SYSTEM</h3>

        <form id="loginForm">
            <div class="input-group">
           
                <input type="text" id="username" name="username" placeholder="Enter a valid user name" required>
            </div>

            <div class="input-group">
              
                <input type="password" id="password" name="password" placeholder="Enter password" required>
            </div>

            <div class="options">
                <label><input type="checkbox" id="rememberMe"> Remember me</label>
                <a href="forget-password.html">Forgot Password?</a>
            </div>

            <button type="submit" class="login-btn">LOGIN</button>
        </form>
    </div>

    <script>
    document.getElementById("loginForm").addEventListener("submit", async function(event) {
        event.preventDefault(); // Prevent default form submission

        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;

        try {
            const response = await fetch("http://127.0.0.1:5000/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    username: username,
                    password: password
                })
            });

            const data = await response.json();

            if (response.ok) {
                alert("Login Successful!");

                localStorage.setItem("isLoggedIn", "true");
                if (document.getElementById("rememberMe").checked) {
                    localStorage.setItem("username", data.username);
                    localStorage.setItem("role", data.role);
                }

                window.location.href = "dashboard.html";
            } else {
                alert(data.error || "Invalid Username or Password.");
            }
        } catch (error) {
            console.error("Error during login:", error);
            alert("Login failed. Please try again.");
        }
    });

    window.onload = function() {
        if (localStorage.getItem("isLoggedIn") === "true") {
            window.location.href = "dashboard.html";
        }
    };
 </script>
</body>
</html>
